name: flutter_portfolio
description: Flutter Developer Portfolio Website
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  google_fonts: ^6.1.0
  url_launcher: ^6.2.4
  visibility_detector: ^0.4.0+2
  animate_do: ^3.3.4
  font_awesome_flutter: ^10.7.0
  lottie: ^3.0.0
  flutter_svg: ^2.0.10+1
  web_smooth_scroll: ^2.0.0
  scrollable_positioned_list: ^0.3.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
